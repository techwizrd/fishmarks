name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show fish version
        uses: fish-actions/install-fish@v1

      - name: Print fish version
        run: fish --version

      - name: Validate fish scripts
        run: fish tests/check.fish

      - name: Run test suite
        run: fish tests/run.fish

      - name: Smoke test installer
        if: matrix.os == 'ubuntu-latest'
        run: |
          TEST_HOME=$(mktemp -d)
          HOME="$TEST_HOME" fish install.fish
          test -f "$TEST_HOME/.config/fish/conf.d/fishmarks.fish"

  fisher-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install fish
        uses: fish-actions/install-fish@v1

      - name: Install plugin with fisher
        uses: fish-actions/fisher@v1
        with:
          plugins: $GITHUB_WORKSPACE

      - name: Verify plugin commands load
        run: |
          type -q save_bookmark
          type -q go_to_bookmark
          type -q fishmarks_version
        shell: fish {0}

  fundle-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install fish
        uses: fish-actions/install-fish@v1

      - name: Install plugin with fundle
        run: |
          command mkdir -p -- "$HOME/.config/fish/functions"
          curl -fsSL https://raw.githubusercontent.com/danhper/fundle/f4b39217e135fd209bd4e055eca8d32decdd91e0/functions/fundle.fish -o "$HOME/.config/fish/functions/fundle.fish"
          source "$HOME/.config/fish/functions/fundle.fish"

          set -l fundle_config (mktemp)
          printf "fundle plugin 'techwizrd/fishmarks' --url '%s'\n" "$GITHUB_WORKSPACE" > "$fundle_config"
          printf 'fundle init\n' >> "$fundle_config"

          source "$fundle_config"
          fundle install
          source "$fundle_config"

          type -q save_bookmark
          type -q go_to_bookmark
          type -q fishmarks_version
        shell: fish {0}
